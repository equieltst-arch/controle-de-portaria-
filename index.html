<html lang="pt-BR">
<head>

<title>Portaria PRO - BUCAGRANS</title>
<style>
:root {
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2330;
  --border:#30363d;
  --accent:#f0a500;
  --green:#3fb950;
  --blue:#388bfd;
  --text:#e6edf3;
  --muted:#8b949e;
  --radius:10px;
  font-size:15px;
  color-scheme: dark;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  padding:20px;
  font-family:'Segoe UI',system-ui,sans-serif;
  font-size:15px;
  line-height:1.5;
}

/* ── HEADER ── */
header{
background:#ffffff;
padding:15px;
border-bottom:2px solid var(–accent);
display:flex;
justify-content:space-between;
align-items:center;
border-radius:10px 10px 0 0;
flex-wrap:wrap;
gap:10px;
color:#111;
}
header h2{color:#111;font-size:18px;}
header small{color:#333;}

/* ── STATS ── */
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin:15px 0;
}
.card{
background:var(–surface);
padding:15px;
border-radius:var(–radius);
border:1px solid var(–border);
text-align:center;
}
.card small{
display:block;
color:var(–muted);
font-size:12px;
font-weight:600;
letter-spacing:.05em;
margin-bottom:4px;
}

/* ── FORM ── */
.form-area{
background:#161b22;
padding:20px;
border-radius:var(–radius);
margin-bottom:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

/* ── INPUTS GLOBAL ── */
input, select, textarea {
background:var(–surface2);
border:1px solid var(–border);
padding:10px 12px;
border-radius:6px;
color:#e6edf3;           /* texto claro bem visível */
font-size:14px;
font-family:inherit;
width:100%;
}
input::placeholder{
color:#6e7681;           /* placeholder cinza médio */
}
input:focus{
outline:none;
border-color:var(–accent);
background:#21262d;
}
/* input de saída nos campos de horário */
input[type=“time”]{
color:#e6edf3;
background:var(–surface2);
}

/* ── BOTÕES ── */
button{
background:var(–accent);
color:#000;
border:none;
padding:10px 14px;
border-radius:6px;
font-weight:700;
font-size:14px;
cursor:pointer;
font-family:inherit;
transition:opacity .15s;
}
button:hover{opacity:.88;}

/* ── PORTEIRO BAR ── */
.porteiro-bar{
background:var(–surface2);
border-radius:8px;
padding:12px 16px;
margin-bottom:12px;
display:flex;
align-items:center;
gap:12px;
border:1px solid var(–border);
}
.porteiro-bar label{
font-weight:700;
font-size:13px;
color:var(–accent);
white-space:nowrap;
}
.porteiro-bar input{
flex:1;
background:var(–surface);
border:1px solid var(–border);
color:#e6edf3;
font-size:14px;
font-weight:600;
}
.porteiro-bar input::placeholder{color:#6e7681;}

/* ── TABS ── */
.tabs-wrap{
display:flex;
gap:8px;
margin-bottom:15px;
flex-wrap:wrap;
align-items:center;
}
.tab{
background:var(–surface);
border:1px solid var(–border);
color:#c9d1d9;           /* texto claro */
padding:8px 16px;
border-radius:6px;
cursor:pointer;
font-weight:700;
font-size:13px;
white-space:nowrap;
transition:background .15s;
}
.tab:hover{background:var(–surface2);}
.tab.ativo{
background:var(–accent);
color:#000;
border-color:var(–accent);
}

/* ── ABRE DATA ── */
.abre-data-wrap{
display:flex;
align-items:center;
gap:6px;
background:var(–surface2);
border:1px solid var(–border);
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}
.abre-data-wrap label{
color:#c9d1d9;
font-size:13px;
font-weight:700;
cursor:pointer;
white-space:nowrap;
}
.abre-data-wrap input[type=“date”]{
background:transparent;
border:none;
color:#e6edf3;
font-size:13px;
font-weight:700;
font-family:inherit;
cursor:pointer;
padding:0;
width:auto;
color-scheme: dark;
}

/* ── TABELA ── */
table{width:100%;border-collapse:collapse;}
th{
padding:12px;
border-bottom:2px solid var(–accent);
text-align:left;
color:#8b949e;
font-size:12px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.05em;
}
td{
padding:10px 12px;
border-bottom:1px solid var(–border);
color:#e6edf3;           /* texto das células bem visível */
font-size:14px;
}
tr:hover td{background:#1c2330;}

/* ── BADGES ── */
.badge{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.dentro{background:#3fb95022;color:#3fb950;}
.saiu{background:#30363d;color:#8b949e;}

/* ── BOTÃO SAÍDA ── */
.btn-saida{
background:var(–blue);
color:#fff;
padding:5px 10px;
font-size:12px;
font-weight:700;
border:none;
border-radius:4px;
cursor:pointer;
}
.btn-saida:hover{opacity:.85;}

/* ── BUSCA ── */
.busca-wrap{margin-bottom:15px;}

/* ── SEÇÃO TÍTULO ── */
.secao-titulo{
background:var(–surface2);
border-left:3px solid var(–accent);
padding:10px 15px;
margin:10px 0 15px 0;
font-weight:700;
font-size:13px;
color:var(–accent);
}

/* ── RESUMO DIA ── */
.resumo-dia{
margin-top:15px;
padding:12px 16px;
background:var(–surface);
border-radius:var(–radius);
border:1px solid var(–border);
font-size:13px;
color:#c9d1d9;
}

/* ── STATUS FIREBASE ── */
#fbStatus{
display:inline-flex;
align-items:center;
gap:6px;
background:#f1f5f9;
border:1px solid #cbd5e1;
border-radius:20px;
padding:5px 12px;
font-size:12px;
font-weight:700;
color:#64748b;
}
</style>

// ===== FIREBASE STATUS =====
function setFbStatus(ok){
  document.getElementById("fbDot").style.background = ok ? "#22c55e" : "#ef4444";
  document.getElementById("fbTxt").textContent = ok ? "Firebase OK" : "Sem conexão";

}

// ===== TEMPO =====
function calcTempo(e, s){
  if(!e) return "-";
  const [h1,m1] = e.split(":").map(Number);
  let h2, m2;
  if(s && s.includes(":")){
    [h2,m2] = s.split(":").map(Number);
  } else {
    const now = new Date();
    h2 = now.getHours(); m2 = now.getMinutes();
  }
  const min = (h2*60+m2)-(h1*60+m1);
  return min < 0 ? "-" : Math.floor(min/60)+"h "+(min%60)+"m";
}

// ===== FORMATAR DATA =====
function fmtData(d){
  const [y,m,dd] = d.split("-");
  return `${dd}/${m}/${y.slice(2)}`;
}

// ===== RENDER TABS =====
function renderTabs(){
  const container = document.getElementById("tabsContainer");
  let html = `<button class="tab ${abaAtiva==='hoje'?'ativo':''}" onclick="setAba('hoje')">📋 HOJE</button>`;
  const datas = [...new Set([...datasHistorico, ...Object.keys(historicoCache)])]
    .filter(d => d !== hoje)
    .sort((a,b) => b.localeCompare(a));
  datas.forEach(d => {
    html += `<button class="tab ${abaAtiva===d?'ativo':''}" onclick="setAba('${d}')">📅 ${fmtData(d)}</button>`;
  });

  // Botão abrir data manual
  const maxData = hoje; // não permite datas futuras
  html += `
    <div class="abre-data-wrap" title="Abrir data específica">
      <label for="inputDataManual">📆 Ir para:</label>
      <input type="date" id="inputDataManual" max="${maxData}" onchange="abrirDataManual(this.value)">
    </div>`;

  container.innerHTML = html;
}

// ===== SET ABA =====
window.setAba = function(aba){
  abaAtiva = aba;
  renderTabs();
  if(aba === "hoje") renderHoje();
  else renderHistorico(aba);
};

// ===== ABRIR DATA MANUAL =====
window.abrirDataManual = function(data){
  if(!data) return;
  if(data === hoje){ setAba("hoje"); return; }
  // Garante que o cache existe (mesmo vazio) para a data
  if(!historicoCache[data]) historicoCache[data] = [];
  // Adiciona à lista se não estiver
  if(!datasHistorico.includes(data)) datasHistorico.push(data);
  setAba(data);
};


// ===== MODO FORMULÁRIO (ENTRADA/SAÍDA) =====
let _entradaSelecionadaId = null;

window.setModoForm = function(modo, data){
  const fe = document.getElementById("formEntrada_"+data);
  const fs = document.getElementById("formSaida_"+data);
  const be = document.getElementById("btnModoEntrada");
  const bs = document.getElementById("btnModoSaida");
  if(!fe||!fs) return;
  if(modo === "entrada"){
    fe.style.display=""; fs.style.display="none";
    be.style.background="var(--accent)"; be.style.color="#000"; be.style.border="none";
    bs.style.background="var(--surface2)"; bs.style.color="var(--muted)"; bs.style.border="1px solid var(--border)";
  } else {
    fe.style.display="none"; fs.style.display="";
    bs.style.background="var(--accent)"; bs.style.color="#000"; bs.style.border="none";
    be.style.background="var(--surface2)"; be.style.color="var(--muted)"; be.style.border="1px solid var(--border)";
    mostrarEntradasAbertas(data, "");
  }
};

// Mostra entradas sem saída, filtrando por placa se informada
function mostrarEntradasAbertas(data, filtroPlaca){
  const el = document.getElementById("entradasAbertas_"+data);
  if(!el) return;
  const registros = (historicoCache[data]||[]).filter(r =>
    !r.saida && (!filtroPlaca || r.placa.includes(filtroPlaca.toUpperCase()))
  );
  if(registros.length === 0){
    el.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:8px 0;">Nenhuma entrada aberta encontrada.</div>`;
    return;
  }
  let html = `<div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:700;">ENTRADAS SEM SAÍDA — clique para selecionar:</div>
    <div style="display:flex;flex-direction:column;gap:6px;">`;
  registros.forEach(r => {
    html += `<div id="cardEntrada_${r.id}" onclick="selecionarEntrada('${r.id}','${r.placa}','${r.nome}','${data}')"
      style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;display:flex;gap:16px;align-items:center;font-size:13px;transition:border-color .15s;">
      <b style="color:var(--accent)">${r.placa}</b>
      <span style="color:#e6edf3">${r.nome}</span>
      <span style="color:var(--muted)">${r.hora}</span>
      <span style="color:var(--muted);font-size:11px">${r.empresa||""}</span>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

window.buscarEntradaAberta = function(data){
  const placa = document.getElementById("saidaPlaca").value.trim();
  _entradaSelecionadaId = null;
  document.getElementById("saidaInfoEntrada").innerHTML = `<span style="color:var(--muted)">Digite a placa para buscar a entrada</span>`;
  mostrarEntradasAbertas(data, placa);
};

window.selecionarEntrada = function(id, placa, nome, data){
  _entradaSelecionadaId = id;
  // Highlight card selecionado
  document.querySelectorAll("[id^='cardEntrada_']").forEach(el => {
    el.style.borderColor = "var(--border)";
    el.style.background = "var(--surface2)";
  });
  const card = document.getElementById("cardEntrada_"+id);
  if(card){ card.style.borderColor="var(--accent)"; card.style.background="#1c2330"; }
  // Preencher placa e mostrar info
  document.getElementById("saidaPlaca").value = placa;
  document.getElementById("saidaInfoEntrada").innerHTML =
    `<span style="color:var(--green)">✔ ${placa} — ${nome}</span>`;
  // Sugerir quem saiu com o nome de quem entrou
  const qs = document.getElementById("saidaQuem");
  if(qs && !qs.value) qs.value = nome;
};

window.registrarSaidaRetroativa = async function(data){
  const hora  = document.getElementById("saidaHora").value;
  const quem  = (document.getElementById("saidaQuem").value||"").trim();

  if(!hora){ alert("Informe a hora de saída"); return; }
  if(!_entradaSelecionadaId){ alert("Selecione a entrada na lista abaixo"); return; }

  await updateDoc(doc(db,"portaria", _entradaSelecionadaId),{ saida: hora, quemSaiu: quem });

  // Atualizar cache
  const reg = (historicoCache[data]||[]).find(r=>r.id===_entradaSelecionadaId);
  if(reg){ reg.saida = hora; reg.quemSaiu = quem; }

  _entradaSelecionadaId = null;
  document.getElementById("saidaPlaca").value="";
  document.getElementById("saidaQuem").value="";
  document.getElementById("saidaInfoEntrada").innerHTML=`<span style="color:var(--green)">✔ Saída registrada!</span>`;

  renderHistorico(data);
  setTimeout(()=>{
    const det=document.getElementById("formRetroativo");
    if(det) det.open=true;
    setModoForm("saida", data);
  },50);
};


window.addRetroativo = async function(data){
  const h   = document.getElementById("histHora").value;
  const p   = document.getElementById("histPlaca").value.toUpperCase().trim();
  const n   = document.getElementById("histNome").value.trim();
  const emp = (document.getElementById("histEmpresa").value||"").trim();
  const ocu = Number(document.getElementById("histOcupantes").value)||1;
  const por = (document.getElementById("histPorteiro").value||"").trim();

  if(!h||!p||!n){ alert("Preencha hora, placa e nome!"); return; }

  const docRef = await addDoc(collection(db,"portaria"),{
    data,
    hora: h,
    placa: p,
    nome: n,
    empresa: emp,
    ocupantes: ocu,
    porteiro: por||"—",
    saida: "",
    quemSaiu: "",
    ts: new Date(data+"T"+h+":00").getTime()
  });

  // Atualizar cache local
  if(!historicoCache[data]) historicoCache[data] = [];
  historicoCache[data].push({id:docRef.id,data,hora:h,placa:p,nome:n,empresa:emp,ocupantes:ocu,porteiro:por||"—",saida:"",quemSaiu:""});
  historicoCache[data].sort((a,b)=>a.hora.localeCompare(b.hora));

  // Limpar campos placa/nome/empresa/ocupantes
  document.getElementById("histPlaca").value="";
  document.getElementById("histNome").value="";
  document.getElementById("histEmpresa").value="";
  document.getElementById("histOcupantes").value="1";

  renderHistorico(data);
  setTimeout(()=>{
    const det=document.getElementById("formRetroativo");
    if(det) det.open=true;
    setModoForm("entrada", data);
  },50);
};

async function carregarDatasHistorico(){
  try {
    const snap = await getDocs(collection(db,"portaria"));
    const datas = new Set();
    snap.forEach(d => {
      const data = d.data().data;
      if(data && data !== hoje) datas.add(data);
    });
    for(const data of datas){
      if(!historicoCache[data]){
        const registros = [];
        snap.forEach(d => {
          if(d.data().data === data) registros.push({id:d.id,...d.data()});
        });
        registros.sort((a,b)=> a.hora.localeCompare(b.hora));
        historicoCache[data] = registros;
      }
      datasHistorico.push(data);
    }
    renderTabs();
    setFbStatus(true);
  } catch(e){
    setFbStatus(false);
  }
}

// ===== OUVIR HOJE =====
function ouvirHoje(){
  if(unsubHoje) unsubHoje();
  const q = query(collection(db,"portaria"), orderBy("ts","asc"));
  unsubHoje = onSnapshot(q, snap => {
    registrosHoje = [];
    const novasDatas = new Set(datasHistorico);
    snap.forEach(d => {
      const reg = {id:d.id,...d.data()};
      if(reg.data === hoje){
        registrosHoje.push(reg);
      } else if(reg.data && reg.data !== hoje){
        novasDatas.add(reg.data);
        if(!historicoCache[reg.data]) historicoCache[reg.data] = [];
        const idx = historicoCache[reg.data].findIndex(r=>r.id===reg.id);
        if(idx === -1) historicoCache[reg.data].push(reg);
        else historicoCache[reg.data][idx] = reg;
      }
    });
    datasHistorico = [...novasDatas].filter(d=>d!==hoje);
    renderTabs();
    if(abaAtiva === "hoje") renderHoje();
    setFbStatus(true);
  }, () => setFbStatus(false));
}

// ===== RENDER HOJE =====
function renderHoje(){
  const busca = (document.getElementById("busca")||{value:""}).value.toLowerCase();

  let html = `
    <div class="porteiro-bar">
      <label>👷 Porteiro do dia:</label>
      <input type="text" id="porteiro" placeholder="Nome do porteiro..." value="${porteiroAtual}">
    </div>
    <div class="form-area">
      <input type="time" id="hora" value="${new Date().toTimeString().slice(0,5)}">
      <input type="text" id="placa" placeholder="PLACA">
      <input type="text" id="nome" placeholder="NOME">
      <input type="text" id="empresa" placeholder="EMPRESA">
      <input type="number" id="ocupantes" value="1">
      <button onclick="add()">REGISTRAR</button>
    </div>
    <div class="busca-wrap">
      <input type="text" id="busca" placeholder="🔍 Buscar placa ou nome..." oninput="renderHoje()" value="${busca}">
    </div>
    <table>
      <thead><tr>
        <th>Status</th><th>Entrada</th><th>Placa</th><th>Entrou</th><th>Empresa</th><th>Tempo</th><th>Saída / Quem saiu</th>
      </tr></thead>
      <tbody>`;

  let d=0, s=0;
  registrosHoje
    .filter(r => r.placa.toLowerCase().includes(busca) || r.nome.toLowerCase().includes(busca))
    .sort((a,b) => b.ts - a.ts)
    .forEach(r => {
      if(r.saida) s++; else d++;
      html += `<tr>
        <td><span class="badge ${r.saida?'saiu':'dentro'}">${r.saida?'SAIU':'PÁTIO'}</span></td>
        <td>${r.hora}</td>
        <td><b>${r.placa}</b></td>
        <td>${r.nome}</td>
        <td style="color:var(--muted);font-size:13px">${r.empresa||""}</td>
        <td style="color:var(--muted);font-size:13px">${calcTempo(r.hora,r.saida)}</td>
        <td>${!r.saida
          ? `<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">
               <input type="time" id="saida-${r.id}" style="width:88px">
               <input type="text" id="quemSaiu-${r.id}" placeholder="Quem saiu" style="width:110px;font-size:12px;">
               <button class="btn-saida" onclick="confirmarSaida('${r.id}')">OK</button>
             </div>`
          : `<div style="line-height:1.4">
               <span style="color:#e6edf3;font-weight:600">${r.saida}</span>
               ${r.quemSaiu ? `<br><span style="color:var(--muted);font-size:12px">↪ ${r.quemSaiu}</span>` : ""}
             </div>`
        }</td>
      </tr>`;
    });

  html += `</tbody></table>`;
  document.getElementById("abaConteudo").innerHTML = html;
  document.getElementById("contDentro").innerText = d;
  document.getElementById("contSaiu").innerText = s;
  document.getElementById("contTotal").innerText = registrosHoje.length;

  document.getElementById("porteiro").addEventListener("input", e => {
    porteiroAtual = e.target.value;
    localStorage.setItem("porteiro_dia", porteiroAtual);
  });
}

// ===== RENDER HISTÓRICO =====
function renderHistorico(data){
  const registros = historicoCache[data] || [];
  const porteiroDia = registros.find(r=>r.porteiro)?.porteiro || "";

  let html = `
    <div class="secao-titulo">
      📅 ${fmtData(data)} — PORTEIRO: ${porteiroDia||"—"} &nbsp;|&nbsp; OBRA: PCH LEBON REGIS
    </div>

    <!-- FORMULÁRIO RETROATIVO -->
    <details id="formRetroativo" style="margin-bottom:14px;">
      <summary style="
        background:var(--surface2);
        border:1px solid var(--border);
        border-radius:6px;
        padding:10px 14px;
        cursor:pointer;
        font-weight:700;
        font-size:13px;
        color:var(--accent);
        list-style:none;
        display:flex;
        align-items:center;
        gap:8px;
      ">➕ Adicionar registro nesta data</summary>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:0 0 8px 8px;padding:14px;">

        <!-- TOGGLE MODO -->
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button id="btnModoEntrada" data-data="${data}" data-modo="entrada" type="button"
            style="flex:1;background:var(--accent);color:#000;border:none;padding:8px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;">
            🚗 Entrada
          </button>
          <button id="btnModoSaida" data-data="${data}" data-modo="saida" type="button"
            style="flex:1;background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:8px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;">
            🚪 Saída
          </button>
        </div>

        <!-- FORM ENTRADA -->
        <div id="formEntrada_${data}">
          <div class="porteiro-bar" style="margin-bottom:10px;">
            <label>👷 Porteiro:</label>
            <input type="text" id="histPorteiro" placeholder="Nome do porteiro..." value="${porteiroDia}">
          </div>
          <div class="form-area" style="margin-bottom:0;">
            <input type="time" id="histHora" value="07:00">
            <input type="text" id="histPlaca" placeholder="PLACA">
            <input type="text" id="histNome" placeholder="NOME">
            <input type="text" id="histEmpresa" placeholder="EMPRESA">
            <input type="number" id="histOcupantes" value="1" min="1">
            <button id="btnSalvarEntrada" data-data="${data}" type="button">SALVAR ENTRADA</button>
          </div>
        </div>

        <!-- FORM SAÍDA -->
        <div id="formSaida_${data}" style="display:none;">
          <div class="form-area" style="margin-bottom:0;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));">
            <div>
              <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">PLACA</label>
              <input type="text" id="saidaPlaca" placeholder="Digite a placa..." data-data="${data}">
            </div>
            <div id="saidaInfoEntrada" style="font-size:12px;color:var(--muted);display:flex;align-items:center;padding-top:18px;">
              Digite a placa para buscar a entrada
            </div>
            <div>
              <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">HORA SAÍDA</label>
              <input type="time" id="saidaHora" value="18:00">
            </div>
            <div>
              <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">QUEM SAIU</label>
              <input type="text" id="saidaQuem" placeholder="Nome de quem saiu">
            </div>
            <div style="display:flex;align-items:flex-end;">
              <button id="btnDarBaixa" data-data="${data}" type="button" style="width:100%">DAR BAIXA</button>
            </div>
          </div>
          <!-- Lista de entradas abertas -->
          <div id="entradasAbertas_${data}" style="margin-top:10px;"></div>
        </div>

      </div>
    </details>

    <div class="busca-wrap">
      <input type="text" id="buscaHist" placeholder="🔍 Buscar no histórico..." oninput="filtrarHist('${data}')" style="width:100%">
    </div>
    <table>
      <thead><tr>
        <th>Entrada</th><th>Placa</th><th>Ocup.</th><th>Entrou</th><th>Empresa</th><th>Saída</th><th>Quem saiu</th><th>Tempo</th>
      </tr></thead>
      <tbody id="corpoHist">`;

  let totalOcup=0, comSaida=0;

  if(registros.length === 0){
    html += `<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--muted);">
      Nenhum registro para esta data.<br>
      <small style="font-size:12px;">Use o formulário acima para adicionar registros retroativos.</small>
    </td></tr>`;
  }
  registros.sort((a,b)=>a.hora.localeCompare(b.hora)).forEach(r => {
    totalOcup += Number(r.ocupantes||0);
    if(r.saida) comSaida++;
    html += `<tr>
      <td>${r.hora}</td>
      <td><b>${r.placa}</b></td>
      <td style="text-align:center">${r.ocupantes}</td>
      <td>${r.nome}</td>
      <td style="color:var(--muted);font-size:13px">${r.empresa||""}</td>
      <td>${r.saida||'<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:var(--muted);font-size:13px">${r.quemSaiu||'<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:var(--muted);font-size:13px">${calcTempo(r.hora,r.saida)}</td>
    </tr>`;
  });

  html += `</tbody></table>
    <div class="resumo-dia">
      <b>Resumo:</b> &nbsp;
      <b style="color:var(--accent)">${registros.length}</b> veículos &nbsp;|&nbsp;
      <b style="color:var(--green)">${comSaida}</b> saíram &nbsp;|&nbsp;
      <b style="color:#e74c3c">${registros.length-comSaida}</b> sem saída &nbsp;|&nbsp;
      <b style="color:var(--blue)">${totalOcup}</b> ocupantes
    </div>`;

  document.getElementById("abaConteudo").innerHTML = html;
  document.getElementById("contDentro").innerText = registros.filter(r=>!r.saida).length;
  document.getElementById("contSaiu").innerText = comSaida;
  document.getElementById("contTotal").innerText = registros.length;

  // ── Bind botões do formulário retroativo ──
  const btnEntrada = document.getElementById("btnModoEntrada");
  const btnSaida   = document.getElementById("btnModoSaida");
  const btnSalvar  = document.getElementById("btnSalvarEntrada");
  const btnBaixa   = document.getElementById("btnDarBaixa");
  const inputPlaca = document.getElementById("saidaPlaca");

  if(btnEntrada) btnEntrada.addEventListener("click", e => { e.stopPropagation(); setModoForm("entrada", data); });
  if(btnSaida)   btnSaida.addEventListener("click",   e => { e.stopPropagation(); setModoForm("saida",   data); });
  if(btnSalvar)  btnSalvar.addEventListener("click",  e => { e.stopPropagation(); addRetroativo(data); });
  if(btnBaixa)   btnBaixa.addEventListener("click",   e => { e.stopPropagation(); registrarSaidaRetroativa(data); });
  if(inputPlaca) inputPlaca.addEventListener("input", () => buscarEntradaAberta(data));
}

// ===== FILTRAR HISTÓRICO =====
window.filtrarHist = function(data){
  const busca = document.getElementById("buscaHist").value.toLowerCase();
  const registros = (historicoCache[data]||[]).filter(r=>
    r.placa.toLowerCase().includes(busca)||
    r.nome.toLowerCase().includes(busca)||
    (r.empresa||"").toLowerCase().includes(busca)
  );
  let html="";
  registros.forEach(r=>{
    html+=`<tr>
      <td>${r.hora}</td>
      <td><b>${r.placa}</b></td>
      <td style="text-align:center">${r.ocupantes}</td>
      <td>${r.nome}</td>
      <td style="color:var(--muted);font-size:13px">${r.empresa||""}</td>
      <td>${r.saida||'<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:var(--muted);font-size:13px">${r.quemSaiu||'<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:var(--muted);font-size:13px">${calcTempo(r.hora,r.saida)}</td>
    </tr>`;
  });
  document.getElementById("corpoHist").innerHTML = html;
};

// ===== ADD =====
window.add = async function(){
  const h = document.getElementById("hora").value;
  const p = document.getElementById("placa").value.toUpperCase().trim();
  const n = document.getElementById("nome").value.trim();
  porteiroAtual = (document.getElementById("porteiro").value||"").trim();

  if(!h||!p||!n){ alert("Preencha hora, placa e nome!"); return; }


  await addDoc(collection(db,"portaria"),{
    data: hoje,
    hora: h,
    placa: p,
    nome: n,
    empresa: (document.getElementById("empresa").value||"").trim(),
    ocupantes: Number(document.getElementById("ocupantes").value)||1,
    porteiro: porteiroAtual||"—",
    saida: "",
    ts: Date.now()
  });

  document.getElementById("placa").value="";
  document.getElementById("nome").value="";
  document.getElementById("empresa").value="";
  document.getElementById("ocupantes").value="1";
  document.getElementById("hora").value = new Date().toTimeString().slice(0,5);
};

// ===== SAÍDA =====
window.confirmarSaida = async function(id){
  const hora = document.getElementById("saida-"+id).value;
  if(!hora){ alert("Informe a hora de saída"); return; }
  const quemSaiu = (document.getElementById("quemSaiu-"+id).value||"").trim();
  await updateDoc(doc(db,"portaria",id),{saida:hora, quemSaiu});
};

// ===== EXPORTAR =====
window.exportar = function(){
  const lista = abaAtiva==="hoje" ? registrosHoje : (historicoCache[abaAtiva]||[]);
  let csv="Data;Placa;Nome;Quem Saiu;Empresa;Porteiro;Entrada;Saida\n";
  lista.forEach(r=>{
    csv+=`${r.data};${r.placa};${r.nome};${r.quemSaiu||""};${r.empresa||""};${r.porteiro||""};${r.hora};${r.saida||""}\n`;
  });
  const blob=new Blob(["\ufeff"+csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`portaria-${abaAtiva}.csv`;
  a.click();
};

// ===== INIT =====
renderTabs();
renderHoje();
carregarDatasHistorico();
ouvirHoje();
</script>
